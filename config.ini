[PATHS]
input_folder = /Users/olegbespalov/Documents/Телемост/
output_excel = /Users/olegbespalov/Documents/Собрания_ИТОГ.xlsx
bin_path = ./bin/whisper-cli
#model_path = ./whisper.cpp/models/ggml-medium.bin
model_path = whisper.cpp/models/ggml-large-v3.bin
db_path = processed_files.json


[AUDIO]
# Порог тишины в dB (чем меньше число, тем тише должен быть звук для удаления)
silence_threshold = -30dB
# Минимальная длительность паузы в секундах для удаления
silence_duration = 1.5
# Оставлять ли после удаления небольшой "зазор" (сек), чтобы речь не была слишком дерганой
padding = 0.2

[TRANSCRIPTION]
engine = gigaam         

[GIGAAM]
model = e2e_rnnt        
device = mps            

[WHISPER]
language = ru
# Использовать ли CoreML (флаг для некоторых версий бинарника)
use_coreml = True

[OLLAMA]
model = qwen2.5:3b
# Температура (0.1 - для точности, 0.7 - для креативности)
temperature = 0.1
# Размер чанка текста для анализа (символы)
chunk_size = 5000
# Нахлест между чанками (символы)
overlap = 600
