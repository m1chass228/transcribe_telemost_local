[PATHS]
input_folder = /Users/olegbespalov/Documents/Телемост/
output_excel = /Users/olegbespalov/Documents/Собрания_ИТОГ.xlsx
bin_path = ./bin/whisper-cli
#model_path = ./whisper.cpp/models/ggml-medium.bin
model_path = whisper.cpp/models/ggml-large-v3.bin
db_path = processed_files.json


[AUDIO]
# Порог тишины в dB (чем меньше число, тем тише должен быть звук для удаления)
silence_threshold = -30dB
# Минимальная длительность паузы в секундах для удаления
silence_duration = 1.5
# Оставлять ли после удаления небольшой "зазор" (сек), чтобы речь не была слишком дерганой
padding = 0.2

[TRANSCRIPTION]
engine = gigaam         

[GIGAAM]
model = e2e_rnnt        
device = mps            

[WHISPER]
language = ru
# Использовать ли CoreML (флаг для некоторых версий бинарника)
use_coreml = True

[OLLAMA]
model = qwen2.5:3b
# Температура (0.1 - для точности, 0.7 - для креативности)
temperature = 0.1

top_p = 0.9

top_k = 20

keep_alive = 10m

# Контекст 
num_ctx = 8192
# Размер чанка текста для анализа (символы)
chunk_size = 5000
# Нахлест между чанками (символы)
overlap = 600

prompt = You are an AI Specialist in noisy transcript analysis for a Veterinary Clinic.
    Your goal: Extract actionable tasks from low-quality ASR text.
    
    ### RECONSTRUCTION STRATEGY:
    1. PHONETIC GUESSING: The text has errors. If a word sounds like a business term or a name but is misspelled (e.g., "priznal na kossii" -> "on commission"), use the most logical veterinary/business replacement.
    2. CONTEXTUAL MAPPING: Use the surrounding words to identify entities. 
       - Words near "filial" or "report" are likely branch names or managers.
       - Words near "check-list" or "schedule" are likely staff names.
    3. NOISE REDUCTION: Ignore stutters, filler words, and sentences that contain zero actionable verbs.
    
    ### ASSIGNEE LOGIC:
    Assign tasks to the person reporting or the person being addressed. 
    Use these codes:
    - ES (Chief Doctor)
    - MN (Finance/Deputy)
    - EKS (Manager)
    - NS (Call Center/Admins)
    - unknown (if assignee is unclear)
    
    ### OUTPUT FORMAT (Strict JSON):
    Return ONLY a JSON object with a "rows" array. 
    Values must be in Russian, clear and professional. 
    Example: {{ "task": "Проверить отчет по вакцинации", "assignee_code": "N
